version: "2"
plugins:
  - name: gen-queries
    process:
      cmd: "true"
sql:
  - schema: "schema/migration"
    queries: "ent/query"
    engine: "postgresql"
    codegen:
      - plugin: gen-queries
        out: "ent/query"
        options:
          tables:
            exclude:
              - "posts"
          queries:
            include:
              - "CopyUsers"
              - "GetUserByEmail"
          insert_columns:
            exclude:
              - "id"
              - "users.created_at"
              - "public.users.updated_at"
          update_columns:
            exclude:
              - "created_at"
              - "users.updated_at"
              - "public.users.deleted_at"
